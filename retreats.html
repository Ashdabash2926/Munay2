<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Way Home · Retreats · Parastoo</title>
  <meta name="description" content="A 7-Day Transformational Retreat in Lake Atitlán, Guatemala · December 17–23, 2026. A sacred invitation to step away and reconnect with who you are." />
  <meta property="og:title" content="The Way Home · A Transformational Retreat · Parastoo" />
  <meta property="og:description" content="A 7-Day Transformational Retreat in Lake Atitlán, Guatemala · December 17–23, 2026." />
  <meta property="og:image" content="https://munay-site.pages.dev/assets/og.jpg" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="retreats">
  <div id="site-nav"></div>

  <main id="page-retreats">

    <!-- ============ PAGE HERO ============ -->
    <section class="hero !min-h-[72svh]">
      <img class="hero__bg" src="assets/img/hero-retreats.webp"
           alt="Lake Atitlán, Guatemala — the setting for The Way Home retreat" fetchpriority="high" />
      <div class="hero__scrim"></div>
      <div class="relative z-10 max-w-6xl mx-auto px-5 pt-28 pb-16 w-full">
        <p class="kicker kicker--gold fade-up" style="--d:.15s" data-i18n="retreat.hero.kicker"></p>
        <h1 class="mt-6 text-[var(--text-inv)] font-display text-[clamp(2.6rem,6.4vw,4.8rem)] max-w-3xl">
          <span class="mask-line"><span style="--d:.3s" data-i18n="retreat.hero.title"></span></span>
        </h1>
        <p class="fade-up mt-5 max-w-xl text-[1.15rem] font-light leading-relaxed text-[rgba(247,241,232,.9)]"
           style="--d:.45s" data-i18n="retreat.hero.subtitle"></p>
        <p class="fade-up mt-4 text-[.95rem] tracking-[.12em] font-medium uppercase text-[var(--gold)]"
           style="--d:.55s" data-i18n="retreat.hero.dates"></p>
      </div>
    </section>

    <!-- ============ INTRO ============ -->
    <section class="bg-[var(--cream-2)] border-b border-[var(--border)]">
      <div class="max-w-3xl mx-auto px-5 py-24 md:py-32 space-y-7">
        <p class="reveal text-[1.05rem] text-[var(--ink)] leading-relaxed" style="--d:.05s" data-i18n="retreat.intro.intro1"></p>
        <p class="reveal text-[1.05rem] text-[var(--ink)] leading-relaxed" style="--d:.1s" data-i18n="retreat.intro.intro2"></p>
        <p class="reveal text-[1.05rem] text-[var(--ink)] leading-relaxed" style="--d:.15s" data-i18n="retreat.intro.intro3"></p>
        <p class="reveal text-[1.05rem] text-[var(--ink)] leading-relaxed" style="--d:.2s" data-i18n="retreat.intro.intro4"></p>
        <p class="reveal text-[clamp(1.15rem,2.2vw,1.4rem)] font-display italic text-[var(--clay)] leading-snug" style="--d:.25s" data-i18n="retreat.intro.intro5"></p>
      </div>
    </section>

    <!-- ============ SUPPORT LIST ============ -->
    <section class="on-dark border-y border-[var(--border-dark)]">
      <div class="max-w-6xl mx-auto px-5 py-24 md:py-32">
        <div class="text-center mb-14">
          <h2 class="reveal font-display text-[clamp(1.9rem,4vw,3rem)]" data-i18n="retreat.support.title"></h2>
        </div>
        <ul class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5" role="list">
          <li class="card reveal p-7" style="--d:.04s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 01</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s1"></p>
          </li>
          <li class="card reveal p-7" style="--d:.08s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 02</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s2"></p>
          </li>
          <li class="card reveal p-7" style="--d:.12s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 03</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s3"></p>
          </li>
          <li class="card reveal p-7" style="--d:.16s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 04</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s4"></p>
          </li>
          <li class="card reveal p-7" style="--d:.20s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 05</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s5"></p>
          </li>
          <li class="card reveal p-7" style="--d:.24s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 06</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s6"></p>
          </li>
          <li class="card reveal p-7" style="--d:.28s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 07</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s7"></p>
          </li>
          <li class="card reveal p-7" style="--d:.32s">
            <span class="text-xs tracking-[.18em] text-[var(--clay)] font-medium" aria-hidden="true">— 08</span>
            <p class="mt-4 text-[var(--muted)] leading-relaxed text-sm" data-i18n="retreat.support.s8"></p>
          </li>
        </ul>
      </div>
    </section>

    <!-- ============ PARALLAX BAND ============ -->
    <section class="parallax min-h-[60svh] flex items-center">
      <img class="parallax__img" loading="lazy"
           src="assets/img/valley-band.webp"
           alt="The landscapes of Lake Atitlán, Guatemala" />
      <div class="absolute inset-0 bg-[rgba(20,12,7,.5)]"></div>
      <div class="relative z-10 max-w-3xl mx-auto px-5 py-28 text-center text-[var(--text-inv)]">
        <p class="font-display text-[clamp(1.6rem,4vw,2.8rem)] leading-snug font-light italic opacity-90">
          "The body holds the key. When we learn to listen, transformation becomes possible."
        </p>
        <p class="mt-5 text-sm tracking-[.2em] font-medium uppercase text-[var(--gold)] opacity-80">— Parastoo</p>
      </div>
    </section>

    <!-- ============ CLOSING CTA ============ -->
    <section class="on-dark relative overflow-hidden">
      <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full opacity-[.07]"
           style="background: radial-gradient(circle, var(--gold) 0%, transparent 70%)" aria-hidden="true"></div>
      <div class="max-w-4xl mx-auto px-5 py-24 md:py-32 text-center relative">
        <div class="chakana reveal text-[var(--clay)]" aria-hidden="true">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M12 2.8 14.4 7l4.6.4-3 3.6 3 3.6-4.6.4L12 19.2 9.6 15l-4.6-.4 3-3.6-3-3.6L9.6 7 12 2.8Z"/></svg>
        </div>
        <h2 class="reveal mt-8 font-display text-[clamp(2.2rem,5.4vw,4rem)]" style="--d:.12s" data-i18n="retreat.cta.title"></h2>
        <p class="reveal lead lead--inv mt-5" style="--d:.24s" data-i18n="retreat.cta.sub"></p>
        <div class="reveal mt-10 flex flex-wrap justify-center gap-4" style="--d:.36s">
          <a href="{{ site.retreat.bookingUrl }}"
             class="btn btn-primary"
             aria-label="Retreat details and booking — opens retreat booking page"
             data-i18n="retreat.cta.button"></a>
          <a href="contact.html" class="btn btn-ghost btn-ghost--inv" data-i18n="cta.book"></a>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
