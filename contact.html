<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact · Parastoo — Embodiment &amp; Plant Medicine</title>
  <meta name="description" content="Book a free discovery call with Parastoo — a space to explore your intentions, needs, and whether we are aligned to work together." />
  <meta property="og:title" content="Contact · Parastoo" />
  <meta property="og:description" content="A free connection call to explore your intentions, needs, questions, and whether we are aligned to work together." />
  <meta property="og:image" content="assets/og.jpg" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="contact">
  <div id="site-nav"></div>

  <main id="page-contact">

    <!-- ============ PAGE HERO ============ -->
    <section class="hero !min-h-[58svh]">
      <img class="hero__bg" src="assets/img/Paras88.webp"
           alt="Parastoo in a calm, light-filled space" fetchpriority="high" />
      <div class="hero__scrim"></div>
      <div class="relative z-10 max-w-6xl mx-auto px-5 pt-28 pb-16 w-full">
        <p class="kicker kicker--gold fade-up" style="--d:.15s" data-i18n="contact.hero.kicker"></p>
        <h1 class="mt-6 text-[var(--text-inv)] font-display text-[clamp(2.4rem,6vw,4.4rem)] max-w-3xl">
          <span class="mask-line"><span style="--d:.3s" data-i18n="contact.hero.title"></span></span>
        </h1>
        <p class="fade-up mt-6 max-w-xl text-[1.05rem] font-light leading-relaxed text-[rgba(247,241,232,.85)]"
           style="--d:.55s" data-i18n="contact.hero.sub"></p>
      </div>
    </section>

    <!-- ============ DISCOVERY CALL PANEL ============ -->
    <section class="max-w-6xl mx-auto px-5 py-16 md:py-20">
      <div class="card reveal p-10 md:p-14 text-center max-w-2xl mx-auto">
        <h2 class="text-[clamp(1.6rem,3.5vw,2.4rem)]" data-i18n="contact.call.title"></h2>
        <p class="mt-4 text-[var(--muted)] leading-relaxed" data-i18n="contact.call.body"></p>
        <a href="https://wa.me/{{ site.contact.whatsapp }}"
           class="btn btn-primary mt-8 inline-flex" data-i18n="cta.whatsapp"></a>
      </div>
    </section>

    <!-- ============ CHANNELS GRID ============ -->
    <section class="max-w-6xl mx-auto px-5 pb-20 md:pb-24 grid sm:grid-cols-3 gap-6">

      <!-- WhatsApp -->
      <a href="https://wa.me/{{ site.contact.whatsapp }}"
         class="card !shadow-none reveal p-8 group no-underline" style="--d:.0s">
        <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M21 11.5a8.5 8.5 0 0 1-12.3 7.6L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5Z"/>
          <path d="M9 10c.5 2.5 2.5 4.5 5 5l1.4-1.4"/>
        </svg>
        <h2 class="mt-4 text-xl" data-i18n="contact.wa.title"></h2>
        <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="contact.wa.body"></p>
      </a>

      <!-- Instagram -->
      <a href="https://instagram.com/{{ site.contact.instagram }}"
         class="card !shadow-none reveal p-8 group no-underline" style="--d:.12s">
        <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r=".5" fill="currentColor" stroke="none"/>
        </svg>
        <h2 class="mt-4 text-xl" data-i18n="contact.ig.title"></h2>
        <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="contact.ig.body"></p>
      </a>

      <!-- Email -->
      <a href="mailto:{{ site.contact.email }}"
         class="card !shadow-none reveal p-8 group no-underline" style="--d:.24s">
        <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        <h2 class="mt-4 text-xl" data-i18n="contact.email.title"></h2>
        <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="contact.email.body"></p>
      </a>

    </section>

    <!-- ============ FORM + IMAGE ============ -->
    <section class="bg-[var(--cream-2)] border-y border-[var(--border)]">
      <div class="max-w-6xl mx-auto px-5 py-20 md:py-28 grid md:grid-cols-2 gap-12 md:gap-16 items-start">
        <div>
          <h2 class="reveal text-[clamp(1.9rem,4vw,2.8rem)]" data-i18n="contact.form.title"></h2>
          <form action="#" method="post" class="mt-9 space-y-6 reveal" style="--d:.12s">
            <div class="field">
              <label for="f-name" data-i18n="contact.form.name"></label>
              <input id="f-name" name="name" type="text" required autocomplete="name" data-i18n-ph="contact.form.name.ph" />
            </div>
            <div class="field">
              <label for="f-email" data-i18n="contact.form.email"></label>
              <input id="f-email" name="email" type="email" required autocomplete="email" data-i18n-ph="contact.form.email.ph" />
            </div>
            <div class="field">
              <label for="f-message" data-i18n="contact.form.message"></label>
              <textarea id="f-message" name="message" required data-i18n-ph="contact.form.message.ph"></textarea>
            </div>
            <div class="flex items-center gap-5 flex-wrap">
              <button type="submit" class="btn btn-primary" data-i18n="contact.form.submit"></button>
              <p class="text-sm text-[var(--muted)]" data-i18n="contact.form.note"></p>
            </div>
          </form>
        </div>
        <div class="reveal-right">
          <img src="assets/img/about-hero.webp"
               alt="A quiet, grounded moment — Parastoo in a natural setting"
               class="w-full object-cover shadow-[var(--shadow-lift)]" />
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
