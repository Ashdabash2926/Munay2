<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parastoo · Embodiment, Plant Medicine &amp; Conscious Living</title>
  <meta name="description" content="Guiding people back to their most authentic, embodied and awakened selves. Embodiment, plant medicine and conscious living — in person and online, worldwide." />
  <meta property="og:title" content="Parastoo · Embodiment, Plant Medicine &amp; Conscious Living" />
  <meta property="og:description" content="Embodiment · Plant Medicine · Conscious Living — guiding people back to their most authentic, embodied and awakened selves." />
  <meta property="og:image" content="assets/og.jpg" />
  <!-- TODO before launch: set an absolute og:image URL on the final domain + re-shoot a Parastoo OG card (see docs/superpowers/specs/image-gaps.md) -->
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="home">
  <div id="site-nav"></div>

  <main id="page-home">

    <!-- ============ HERO — five-pillar rotator ============ -->
    <section class="hero" id="pillarHero">
      <div class="hero__drift">
        <div class="hero__depth">
          <img class="hero__slide is-active" data-pillar-slide="0"
               src="{{ site.hero.slide1 | imgsrc }}"
               alt="Parastoo in embodied presence during a one-to-one session" fetchpriority="high" />
          <img class="hero__slide" data-pillar-slide="1" loading="lazy"
               src="{{ site.hero.slide2 | imgsrc }}"
               alt="Two women in warm, supportive connection during a one-to-one session" />
          <img class="hero__slide" data-pillar-slide="2" loading="lazy"
               src="{{ site.hero.slide3 | imgsrc }}"
               alt="Group embodiment practice and meditation in a light-filled space" />
          <img class="hero__slide" data-pillar-slide="3" loading="lazy"
               src="{{ site.hero.slide4 | imgsrc }}"
               alt="A circle gathered in ceremony — held, present, and open" />
          <img class="hero__slide" data-pillar-slide="4" loading="lazy"
               src="{{ site.hero.slide5 | imgsrc }}"
               alt="A sharing circle gathered on the grass with instruments and mountain views" />
        </div>
      </div>
      <div class="hero__scrim"></div>
      <div class="hero__aurora" aria-hidden="true"></div>
      <div id="moteField" class="absolute inset-0 pointer-events-none" aria-hidden="true"></div>

      <!-- palo santo smoke wisp -->
      <svg class="wisp w-40 h-72 bottom-[18%] right-[12%] hidden md:block" viewBox="0 0 100 220" fill="none" aria-hidden="true">
        <path d="M52 215 C 38 180, 70 160, 55 128 C 42 100, 66 84, 56 56 C 48 32, 60 18, 53 2"
              stroke="rgba(247,241,232,.55)" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <div class="hero__counter" id="pillarCounter" aria-hidden="true">01</div>

      <div class="relative z-10 max-w-6xl mx-auto px-5 pt-28 pb-24 w-full hero__content">
        <p class="kicker kicker--gold fade-up" style="--d:.15s" data-i18n="home.hero.kicker"></p>
        <h1 class="mt-6 text-[var(--text-inv)] font-display text-[clamp(2.7rem,7vw,5.6rem)] max-w-5xl">
          <span class="mask-line"><span class="font-light italic text-[.62em] text-[rgba(247,241,232,.9)]" style="--d:.3s" data-i18n="home.hero.lead">A sanctuary for</span></span>
          <span class="rotator fade-up" id="pillarRotator" style="--d:.5s">
            <span class="hr-word is-in shimmer" data-i18n="pillar.1"></span>
            <span class="hr-word shimmer" data-i18n="pillar.2"></span>
            <span class="hr-word shimmer" data-i18n="pillar.3"></span>
            <span class="hr-word shimmer" data-i18n="pillar.4"></span>
            <span class="hr-word shimmer" data-i18n="pillar.5"></span>
          </span>
        </h1>
        <div class="chips fade-up mt-8" id="pillarChips" style="--d:.75s">
          <button class="chip is-active" data-pillar="0"><i>01</i><span data-i18n="pillar.1"></span></button>
          <button class="chip" data-pillar="1"><i>02</i><span data-i18n="pillar.2"></span></button>
          <button class="chip" data-pillar="2"><i>03</i><span data-i18n="pillar.3"></span></button>
          <button class="chip" data-pillar="3"><i>04</i><span data-i18n="pillar.4"></span></button>
          <button class="chip" data-pillar="4"><i>05</i><span data-i18n="pillar.5"></span></button>
        </div>
        <p class="fade-up mt-8 max-w-xl text-[1.08rem] font-light leading-relaxed text-[rgba(247,241,232,.85)]"
           style="--d:.95s" data-i18n="home.hero.sub"></p>
        <div class="fade-up mt-10 flex flex-wrap items-center gap-4" style="--d:1.15s">
          <a href="contact.html" class="btn btn-primary" data-i18n="cta.book"></a>
          <a href="offerings.html" class="btn btn-ghost btn-ghost--inv" data-i18n="home.hero.cta2"></a>
        </div>
      </div>

      <div class="scroll-cue" aria-hidden="true"><span></span></div>
    </section>

    <!-- ============ WORD RIBBON — the five pillars ============ -->
    <section class="on-dark py-7 border-y border-[var(--border-dark)]" aria-hidden="true">
      <div class="ribbon">
        <div class="ribbon__track">
          <span><i class="not-italic" data-i18n="pillar.1"></i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="pillar.2"></i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="pillar.3"></i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="pillar.4"></i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="pillar.5"></i><i class="dot"></i></span>
        </div>
      </div>
    </section>

    <!-- ============ MISSION ============ -->
    <section class="max-w-6xl mx-auto px-5 py-24 md:py-36 grid md:grid-cols-2 gap-14 md:gap-20 items-center">
      <div class="relative">
        <div class="reveal-left parallax aspect-[4/5] max-w-md">
          <img class="parallax__img" loading="lazy"
               src="{{ site.escape.image | imgsrc }}"
               alt="Parastoo in a light-filled space — presence and ease" />
        </div>
        <div class="reveal-scale absolute -bottom-10 -right-2 sm:right-6 md:-right-8 w-44 sm:w-52 shadow-[var(--shadow-lift)] border-4 border-[var(--cream)]"
             style="--d:.25s">
          <img class="aspect-square object-cover" loading="lazy"
               src="assets/img/mission-hands.webp"
               alt="Healing hands resting gently during a bodywork session" />
        </div>
      </div>
      <div>
        <p class="kicker reveal" data-i18n="home.mission.kicker"></p>
        <h2 class="reveal mt-5 text-[clamp(2rem,4.4vw,3.2rem)]" style="--d:.1s" data-i18n="home.mission.title"></h2>
        <p class="reveal lead mt-6" style="--d:.2s" data-i18n="home.mission.body"></p>
        <a href="about.html" class="reveal link-line inline-block mt-8 text-[.82rem] font-semibold tracking-[.2em] uppercase text-[var(--clay)]"
           style="--d:.3s" data-i18n="home.mission.link"></a>
      </div>
    </section>

    <!-- ============ FIVE PATHS ============ -->
    <section class="max-w-6xl mx-auto px-5 pb-24 md:pb-36">
      <div class="max-w-2xl">
        <p class="kicker reveal" data-i18n="home.pillars.kicker"></p>
        <h2 class="reveal mt-5 text-[clamp(2rem,4.4vw,3.2rem)]" style="--d:.1s" data-i18n="home.pillars.title"></h2>
      </div>
      <div class="mt-12">
        <div class="pillar-row reveal">
          <span class="pr-num">— 01</span>
          <h3 data-i18n="pillar.1"></h3>
          <p data-i18n="pillar.1.desc"></p>
        </div>
        <div class="pillar-row reveal" style="--d:.08s">
          <span class="pr-num">— 02</span>
          <h3 data-i18n="pillar.2"></h3>
          <p data-i18n="pillar.2.desc"></p>
        </div>
        <div class="pillar-row reveal" style="--d:.16s">
          <span class="pr-num">— 03</span>
          <h3 data-i18n="pillar.3"></h3>
          <p data-i18n="pillar.3.desc"></p>
        </div>
        <div class="pillar-row reveal" style="--d:.24s">
          <span class="pr-num">— 04</span>
          <h3 data-i18n="pillar.4"></h3>
          <p data-i18n="pillar.4.desc"></p>
        </div>
        <div class="pillar-row reveal" style="--d:.32s">
          <span class="pr-num">— 05</span>
          <h3 data-i18n="pillar.5"></h3>
          <p data-i18n="pillar.5.desc"></p>
        </div>
      </div>
    </section>

    <!-- ============ FEATURED TREATMENTS ============ -->
    <section class="bg-[var(--cream-2)] border-y border-[var(--border)]">
      <div class="max-w-6xl mx-auto px-5 py-24 md:py-32">
        <div class="text-center max-w-2xl mx-auto">
          <p class="kicker kicker--center reveal justify-center" data-i18n="home.featured.kicker"></p>
          <h2 class="reveal mt-5 text-[clamp(2rem,4.4vw,3.2rem)]" style="--d:.1s" data-i18n="home.featured.title"></h2>
        </div>

        <div class="mt-16 grid md:grid-cols-3 gap-7">
          <!-- card 1 -->
          <article class="card reveal">
            <a href="offerings.html">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="assets/img/treatment-hot-stone.webp"
                   alt="One-to-one mentorship session" />
              <span class="num-ghost absolute -bottom-7 right-4">01</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.f1.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.f1.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.f1.meta"></p>
            </div>
            </a>
          </article>
          <!-- card 2 -->
          <article class="card reveal" style="--d:.15s">
            <a href="offerings.html">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="assets/img/treatment-aromatherapy.webp"
                   alt="The Embodied Plant Medicine Method session" />
              <span class="num-ghost absolute -bottom-7 right-4">02</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.f2.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.f2.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.f2.meta"></p>
            </div>
            </a>
          </article>
          <!-- card 3 -->
          <article class="card reveal" style="--d:.3s">
            <a href="offerings.html">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="assets/img/treatment-energy.webp"
                   alt="Psilocybin ceremony in a safe, held container" />
              <span class="num-ghost absolute -bottom-7 right-4">03</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.f3.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.f3.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.f3.meta"></p>
            </div>
            </a>
          </article>
        </div>

        <div class="text-center mt-14 reveal">
          <a href="offerings.html" class="btn btn-ghost" data-i18n="home.featured.all"></a>
        </div>
      </div>
    </section>

    <!-- ============ ESCAPE BAND ============ -->
    <section class="parallax min-h-[68svh] flex items-center">
      <img class="parallax__img" loading="lazy"
           src="assets/img/escape-band.webp"
           alt="A group resting together in a mandala on the floor of the sunlit dome" />
      <div class="absolute inset-0 bg-[rgba(20,12,7,.55)]"></div>
      <div class="relative z-10 max-w-4xl mx-auto px-5 py-28 text-center text-[var(--text-inv)]">
        <p class="kicker kicker--gold kicker--center reveal justify-center" data-i18n="home.escape.kicker"></p>
        <h2 class="reveal mt-6 font-display text-[clamp(2.4rem,6vw,4.6rem)]" style="--d:.12s" data-i18n="home.escape.title"></h2>
        <p class="reveal mt-6 text-lg font-light text-[rgba(247,241,232,.85)]" style="--d:.24s" data-i18n="home.escape.sub"></p>
        <a href="retreats.html" class="btn btn-primary mt-10 reveal" style="--d:.36s" data-i18n="cta.explore"></a>
      </div>
    </section>

    <!-- ============ TESTIMONIAL ============ -->
    <section class="max-w-3xl mx-auto px-5 py-24 md:py-32 text-center">
      <div class="chakana reveal" aria-hidden="true">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M12 2.8 14.4 7l4.6.4-3 3.6 3 3.6-4.6.4L12 19.2 9.6 15l-4.6-.4 3-3.6-3-3.6L9.6 7 12 2.8Z"/></svg>
      </div>
      <blockquote class="reveal mt-8 font-display text-[clamp(1.5rem,3.2vw,2.2rem)] leading-snug font-[420]"
                  style="--d:.12s" data-i18n="home.testimonial.quote"></blockquote>
      <p class="reveal mt-7 text-[.8rem] font-semibold tracking-[.22em] uppercase text-[var(--muted)]"
         style="--d:.24s" data-i18n="home.testimonial.name"></p>
    </section>

    <!-- ============ CLOSING CTA ============ -->
    <section class="on-dark relative overflow-hidden">
      <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full opacity-[.07]"
           style="background: radial-gradient(circle, var(--gold) 0%, transparent 70%)" aria-hidden="true"></div>
      <div class="max-w-4xl mx-auto px-5 py-24 md:py-32 text-center relative">
        <h2 class="reveal font-display text-[clamp(2.2rem,5.4vw,4rem)]" data-i18n="home.cta.title"></h2>
        <p class="reveal lead lead--inv mt-6" style="--d:.12s" data-i18n="home.cta.sub"></p>
        <div class="reveal mt-10 flex flex-wrap justify-center gap-4" style="--d:.24s">
          <a href="contact.html" class="btn btn-primary" data-i18n="cta.book"></a>
          <a href="https://wa.me/{{ site.contact.whatsapp }}" class="btn btn-ghost btn-ghost--inv" data-i18n="cta.whatsapp"></a>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
