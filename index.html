<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Munay · Holistic Massage — Sacred Valley, Písac</title>
  <meta name="description" content="Holistic massage in Písac, Sacred Valley. Relax, restore and rebalance body, mind and spirit beneath the Andes." />
  <meta property="og:title" content="Munay · Holistic Massage — Sacred Valley" />
  <meta property="og:description" content="Holistic massage in Písac, Sacred Valley, Cusco. Relax, restore, rebalance." />
  <meta property="og:image" content="assets/og.jpg" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="home">
  <div id="site-nav"></div>

  <main id="page-home">

    <!-- ============ HERO ============ -->
    <section class="hero">
      <img class="hero__bg" src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=2000&auto=format&fit=crop"
           alt="Warm candlelit massage stones and orchid in a quiet spa room" fetchpriority="high" />
      <div class="hero__scrim"></div>

      <!-- palo santo smoke wisp -->
      <svg class="wisp w-40 h-72 bottom-[18%] right-[12%] hidden md:block" viewBox="0 0 100 220" fill="none" aria-hidden="true">
        <path d="M52 215 C 38 180, 70 160, 55 128 C 42 100, 66 84, 56 56 C 48 32, 60 18, 53 2"
              stroke="rgba(247,241,232,.55)" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <div class="relative z-10 max-w-6xl mx-auto px-5 pt-28 pb-24 w-full">
        <p class="kicker kicker--gold fade-up" style="--d:.15s" data-i18n="home.hero.kicker">Písac · Sacred Valley · Peru</p>
        <h1 class="mt-6 text-[var(--text-inv)] font-display text-[clamp(2.9rem,8vw,6.2rem)] max-w-4xl">
          <span class="mask-line"><span style="--d:.3s" data-i18n="home.hero.l1">Where the body</span></span>
          <span class="mask-line"><span style="--d:.45s"><em class="shimmer not-italic" data-i18n="home.hero.l2">remembers</em></span></span>
          <span class="mask-line"><span style="--d:.6s" data-i18n="home.hero.l3">how to rest.</span></span>
        </h1>
        <p class="fade-up mt-7 max-w-xl text-[1.08rem] font-light leading-relaxed text-[rgba(247,241,232,.85)]"
           style="--d:.85s" data-i18n="home.hero.sub"></p>
        <div class="fade-up mt-10 flex flex-wrap items-center gap-4" style="--d:1.05s">
          <a href="contact.html" class="btn btn-primary" data-i18n="cta.book"></a>
          <a href="treatments.html" class="btn btn-ghost btn-ghost--inv" data-i18n="home.hero.cta2"></a>
        </div>
      </div>

      <div class="scroll-cue" aria-hidden="true"><span></span></div>
    </section>

    <!-- ============ WORD RIBBON ============ -->
    <section class="on-dark py-7 border-y border-[var(--border-dark)]" aria-hidden="true">
      <div class="ribbon">
        <div class="ribbon__track">
          <span><i class="not-italic" data-i18n="ribbon.relax">Relax</i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="ribbon.restore">Restore</i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="ribbon.rebalance">Rebalance</i><i class="dot"></i></span>
          <span><i class="not-italic" data-i18n="ribbon.breathe">Breathe</i><i class="dot"></i></span>
        </div>
      </div>
    </section>

    <!-- ============ MISSION ============ -->
    <section class="max-w-6xl mx-auto px-5 py-24 md:py-36 grid md:grid-cols-2 gap-14 md:gap-20 items-center">
      <div class="relative">
        <div class="reveal-left parallax aspect-[4/5] max-w-md">
          <img class="parallax__img" loading="lazy"
               src="https://images.unsplash.com/photo-1600334129128-685c5582fd35?q=80&w=1200&auto=format&fit=crop"
               alt="Warm massage oils and folded linen in soft light" />
        </div>
        <div class="reveal-scale absolute -bottom-10 -right-2 sm:right-6 md:-right-8 w-44 sm:w-52 shadow-[var(--shadow-lift)] border-4 border-[var(--cream)]"
             style="--d:.25s">
          <img class="aspect-square object-cover" loading="lazy"
               src="https://images.unsplash.com/photo-1519823551278-64ac92734fb1?q=80&w=600&auto=format&fit=crop"
               alt="Amber essential-oil dropper bottle" />
        </div>
      </div>
      <div>
        <p class="kicker reveal" data-i18n="home.mission.kicker"></p>
        <h2 class="reveal mt-5 text-[clamp(2rem,4.4vw,3.2rem)]" style="--d:.1s" data-i18n="home.mission.title"></h2>
        <p class="reveal lead mt-6" style="--d:.2s" data-i18n="home.mission.body"></p>
        <a href="about.html" class="reveal link-line inline-block mt-8 text-[.82rem] font-semibold tracking-[.2em] uppercase text-[var(--clay)]"
           style="--d:.3s" data-i18n="home.mission.link"></a>
      </div>
    </section>

    <!-- ============ FEATURED TREATMENTS ============ -->
    <section class="bg-[var(--cream-2)] border-y border-[var(--border)]">
      <div class="max-w-6xl mx-auto px-5 py-24 md:py-32">
        <div class="text-center max-w-2xl mx-auto">
          <p class="kicker kicker--center reveal justify-center" data-i18n="home.featured.kicker"></p>
          <h2 class="reveal mt-5 text-[clamp(2rem,4.4vw,3.2rem)]" style="--d:.1s" data-i18n="home.featured.title"></h2>
        </div>

        <div class="mt-16 grid md:grid-cols-3 gap-7">
          <!-- card 1 -->
          <article class="card reveal">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?q=80&w=900&auto=format&fit=crop"
                   alt="Hot volcanic stones placed along a person's back" />
              <span class="num-ghost absolute -bottom-7 right-4">01</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.t1.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.t1.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.t1.meta"></p>
            </div>
          </article>
          <!-- card 2 -->
          <article class="card reveal" style="--d:.15s">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?q=80&w=900&auto=format&fit=crop"
                   alt="Massage therapist working oil into a client's shoulders" />
              <span class="num-ghost absolute -bottom-7 right-4">02</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.t2.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.t2.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.t2.meta"></p>
            </div>
          </article>
          <!-- card 3 -->
          <article class="card reveal" style="--d:.3s">
            <div class="card__media aspect-[4/3] relative">
              <img class="w-full h-full object-cover" loading="lazy"
                   src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=900&auto=format&fit=crop"
                   alt="Person meditating cross-legged at sunrise" />
              <span class="num-ghost absolute -bottom-7 right-4">03</span>
            </div>
            <div class="p-7 pt-9">
              <h3 class="text-2xl" data-i18n="home.t3.name"></h3>
              <p class="mt-3 text-[.95rem] text-[var(--muted)]" data-i18n="home.t3.blurb"></p>
              <p class="mt-5 text-[.78rem] font-semibold tracking-[.16em] uppercase text-[var(--clay)]" data-i18n="home.t3.meta"></p>
            </div>
          </article>
        </div>

        <div class="text-center mt-14 reveal">
          <a href="treatments.html" class="btn btn-ghost" data-i18n="home.featured.all"></a>
        </div>
      </div>
    </section>

    <!-- ============ ESCAPE BAND ============ -->
    <section class="parallax min-h-[68svh] flex items-center">
      <img class="parallax__img" loading="lazy"
           src="https://images.unsplash.com/photo-1526392060635-9d6019884377?q=80&w=2000&auto=format&fit=crop"
           alt="Andean mountains and terraces of the Sacred Valley at dusk" />
      <div class="absolute inset-0 bg-[rgba(20,12,7,.55)]"></div>
      <div class="relative z-10 max-w-4xl mx-auto px-5 py-28 text-center text-[var(--text-inv)]">
        <p class="kicker kicker--gold kicker--center reveal justify-center" data-i18n="home.escape.kicker"></p>
        <h2 class="reveal mt-6 font-display text-[clamp(2.4rem,6vw,4.6rem)]" style="--d:.12s" data-i18n="home.escape.title"></h2>
        <p class="reveal mt-6 text-lg font-light text-[rgba(247,241,232,.85)]" style="--d:.24s" data-i18n="home.escape.sub"></p>
        <a href="contact.html" class="btn btn-primary mt-10 reveal" style="--d:.36s" data-i18n="cta.book"></a>
      </div>
    </section>

    <!-- ============ TESTIMONIAL ============ -->
    <section class="max-w-3xl mx-auto px-5 py-24 md:py-32 text-center">
      <div class="chakana reveal" aria-hidden="true">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M12 2.8 14.4 7l4.6.4-3 3.6 3 3.6-4.6.4L12 19.2 9.6 15l-4.6-.4 3-3.6-3-3.6L9.6 7 12 2.8Z"/></svg>
      </div>
      <blockquote class="reveal mt-8 font-display text-[clamp(1.5rem,3.2vw,2.2rem)] leading-snug font-[420]"
                  style="--d:.12s" data-i18n="home.testimonial.quote"></blockquote>
      <p class="reveal mt-7 text-[.8rem] font-semibold tracking-[.22em] uppercase text-[var(--muted)]"
         style="--d:.24s" data-i18n="home.testimonial.name"></p>
    </section>

    <!-- ============ CLOSING CTA ============ -->
    <section class="on-dark relative overflow-hidden">
      <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full opacity-[.07]"
           style="background: radial-gradient(circle, var(--gold) 0%, transparent 70%)" aria-hidden="true"></div>
      <div class="max-w-4xl mx-auto px-5 py-24 md:py-32 text-center relative">
        <h2 class="reveal font-display text-[clamp(2.2rem,5.4vw,4rem)]" data-i18n="home.cta.title"></h2>
        <p class="reveal lead lead--inv mt-6" style="--d:.12s" data-i18n="home.cta.sub"></p>
        <div class="reveal mt-10 flex flex-wrap justify-center gap-4" style="--d:.24s">
          <a href="contact.html" class="btn btn-primary" data-i18n="cta.book"></a>
          <a href="https://wa.me/XXXXXXXXX" class="btn btn-ghost btn-ghost--inv" data-i18n="cta.whatsapp"></a>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
