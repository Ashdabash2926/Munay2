<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · Munay — Holistic Massage, Sacred Valley</title>
  <meta name="description" content="The philosophy, oils and Sacred Valley setting behind Munay — holistic massage in Písac, Cusco, Peru." />
  <meta property="og:title" content="About Munay · Holistic Massage" />
  <meta property="og:description" content="A practice of presence in Písac, Sacred Valley, Cusco." />
  <meta property="og:image" content="https://ashdabash2926.github.io/Munay2/assets/og.jpg" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="about">
  <div id="site-nav"></div>

  <main id="page-about">

    <!-- ============ PAGE HERO ============ -->
    <section class="hero !min-h-[64svh]">
      <img class="hero__bg" src="assets/img/hero-retreats.webp"
           alt="Garden sanctuary with hammocks where treatments take place" fetchpriority="high" />
      <div class="hero__scrim"></div>
      <div class="relative z-10 max-w-6xl mx-auto px-5 pt-28 pb-16 w-full">
        <p class="kicker kicker--gold fade-up" style="--d:.15s" data-i18n="about.hero.kicker"></p>
        <h1 class="mt-6 text-[var(--text-inv)] font-display text-[clamp(2.6rem,6.4vw,4.8rem)] max-w-3xl">
          <span class="mask-line"><span style="--d:.3s" data-i18n="about.hero.title"></span></span>
        </h1>
        <p class="fade-up mt-6 max-w-xl text-[1.05rem] font-light leading-relaxed text-[rgba(247,241,232,.85)]"
           style="--d:.55s" data-i18n="about.hero.sub"></p>
      </div>
    </section>

    <!-- ============ PHILOSOPHY ============ -->
    <section class="max-w-6xl mx-auto px-5 py-24 md:py-36 grid md:grid-cols-12 gap-12 items-center">
      <div class="md:col-span-6 lg:col-span-5">
        <p class="kicker reveal" data-i18n="about.phil.kicker"></p>
        <h2 class="reveal mt-5 text-[clamp(2rem,4.2vw,3.1rem)]" style="--d:.1s" data-i18n="about.phil.title"></h2>
        <p class="reveal lead mt-6" style="--d:.2s" data-i18n="about.phil.b1"></p>
        <p class="reveal mt-5 text-[var(--muted)]" style="--d:.3s" data-i18n="about.phil.b2"></p>
      </div>
      <div class="md:col-span-6 lg:col-span-7 relative md:ps-8">
        <div class="reveal-right parallax aspect-[5/4]">
          <img class="parallax__img" loading="lazy"
               src="assets/img/philosophy.webp"
               alt="Practitioner gently cradling a client's head and neck" />
        </div>
        <span class="num-ghost absolute -bottom-9 start-2 hidden md:block" aria-hidden="true">munay</span>
      </div>
    </section>

    <!-- ============ PRACTITIONER STORY ============ -->
    <section class="on-dark border-y border-[var(--border-dark)]">
      <div class="max-w-6xl mx-auto px-5 py-24 md:py-32 grid md:grid-cols-2 gap-12 items-center">
        <div class="reveal-left parallax aspect-[4/5] max-w-md order-last md:order-first">
          <img class="parallax__img" loading="lazy"
               src="assets/img/practitioner.webp"
               alt="Portrait of the practitioner smiling beneath the trees" />
        </div>
        <div>
          <p class="kicker kicker--gold reveal" data-i18n="about.story.kicker"></p>
          <h2 class="reveal mt-5 text-[clamp(2rem,4.2vw,3.1rem)] text-[var(--text-inv)]" style="--d:.1s" data-i18n="about.story.title"></h2>
          <p class="reveal lead lead--inv mt-6" style="--d:.2s" data-i18n="about.story.body"></p>
        </div>
      </div>
    </section>

    <!-- ============ OILS & AROMATHERAPY RITUAL ============ -->
    <section class="bg-[var(--cream-2)] border-b border-[var(--border)]">
      <div class="max-w-6xl mx-auto px-5 py-24 md:py-32">
        <div class="grid md:grid-cols-2 gap-12 items-center">
          <div>
            <p class="kicker reveal" data-i18n="about.oils.kicker"></p>
            <h2 class="reveal mt-5 text-[clamp(2rem,4.2vw,3.1rem)]" style="--d:.1s" data-i18n="about.oils.title"></h2>
            <p class="reveal lead mt-6" style="--d:.2s" data-i18n="about.oils.b1"></p>
          </div>
          <div class="reveal-right parallax aspect-[5/4]">
            <img class="parallax__img" loading="lazy"
                 src="assets/img/oils-ritual.webp"
                 alt="Warm oil massage glistening on a client's back" />
          </div>
        </div>

        <div class="mt-16 grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="card !shadow-none reveal p-7">
            <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M12 21c4-3.5 7-7.6 7-11a7 7 0 1 0-14 0c0 3.4 3 7.5 7 11Z"/><path d="M12 21V10"/><path d="M12 13c-1.8-.4-3-1.6-3.4-3.4M12 16c2-.4 3.4-1.8 3.8-3.8"/></svg>
            <h3 class="mt-4 text-xl" data-i18n="about.oil1.name"></h3>
            <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="about.oil1.desc"></p>
          </div>
          <div class="card !shadow-none reveal p-7" style="--d:.1s">
            <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M4 20c8 0 14-6 16-16-10 2-16 8-16 16Z"/><path d="M4 20c2-6 6-10 12-12"/></svg>
            <h3 class="mt-4 text-xl" data-i18n="about.oil2.name"></h3>
            <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="about.oil2.desc"></p>
          </div>
          <div class="card !shadow-none reveal p-7" style="--d:.2s">
            <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M12 3v18M12 7c-2.5 0-4-1.5-4-4 2.5 0 4 1.5 4 4Zm0 0c2.5 0 4-1.5 4-4-2.5 0-4 1.5-4 4Zm0 5c-2.5 0-4-1.5-4-4 2.5 0 4 1.5 4 4Zm0 0c2.5 0 4-1.5 4-4-2.5 0-4 1.5-4 4Z"/></svg>
            <h3 class="mt-4 text-xl" data-i18n="about.oil3.name"></h3>
            <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="about.oil3.desc"></p>
          </div>
          <div class="card !shadow-none reveal p-7" style="--d:.3s">
            <svg class="w-6 h-6 text-[var(--clay)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M10 21V8l4-2v15"/><path d="M12 6c0-1.5.6-2.6 2-3.5"/><path d="M8 21h8"/></svg>
            <h3 class="mt-4 text-xl" data-i18n="about.oil4.name"></h3>
            <p class="mt-2 text-sm text-[var(--muted)]" data-i18n="about.oil4.desc"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ SACRED VALLEY SETTING ============ -->
    <section class="parallax min-h-[74svh] flex items-center">
      <img class="parallax__img" loading="lazy"
           src="assets/img/valley-band.webp"
           alt="Open-air massage with the Sacred Valley mountains beyond" />
      <div class="absolute inset-0 bg-[rgba(20,12,7,.58)]"></div>
      <div class="relative z-10 max-w-3xl mx-auto px-5 py-28 text-center text-[var(--text-inv)]">
        <p class="kicker kicker--gold kicker--center reveal justify-center" data-i18n="about.valley.kicker"></p>
        <h2 class="reveal mt-6 font-display text-[clamp(2.2rem,5.4vw,4rem)]" style="--d:.12s" data-i18n="about.valley.title"></h2>
        <p class="reveal mt-6 text-lg font-light leading-relaxed text-[rgba(247,241,232,.88)]" style="--d:.24s" data-i18n="about.valley.body"></p>
      </div>
    </section>

    <!-- ============ CTA ============ -->
    <section class="max-w-4xl mx-auto px-5 py-24 md:py-32 text-center">
      <div class="chakana reveal text-[var(--clay)]" aria-hidden="true">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M12 2.8 14.4 7l4.6.4-3 3.6 3 3.6-4.6.4L12 19.2 9.6 15l-4.6-.4 3-3.6-3-3.6L9.6 7 12 2.8Z"/></svg>
      </div>
      <h2 class="reveal mt-8 font-display text-[clamp(2.2rem,5.4vw,4rem)]" style="--d:.12s" data-i18n="about.cta.title"></h2>
      <p class="reveal lead mt-5" style="--d:.24s" data-i18n="about.cta.sub"></p>
      <a href="contact.html" class="btn btn-primary mt-10 reveal" style="--d:.36s" data-i18n="cta.book"></a>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
