  <style>
    /* ── Sticky sub-nav ── */
    #offer-subnav {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--cream-2);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(44,30,21,.06);
    }
    .subnav-inner {
      max-width: 72rem;
      margin: 0 auto;
      padding: .6rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: .3rem .5rem;
      align-items: center;
    }
    .subnav-link {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .45rem .9rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color .25s, border-color .25s, background-color .25s;
    }
    .subnav-link:hover {
      color: var(--clay);
      border-color: var(--border);
      background: var(--cream);
    }
    /* ── pull-quote ── */
    .pull-quote {
      border-left: 2px solid var(--gold);
      padding-left: 1.5rem;
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.7;
      color: var(--muted-inv);
    }
    .pull-quote p + p { margin-top: .7em; }
    /* cream pull-quote variant (on cream bg) */
    .pull-quote--cream {
      color: var(--muted);
      border-color: var(--clay-light);
    }
    /* ── invite passage ── */
    .invite-block {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-top: 1.5rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.85;
    }
    .invite-block p + p { margin-top: .6em; }
    /* ── support list ── */
    .support-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: .55rem;
    }
    .support-list li {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      font-size: .97rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .support-list li::before {
      content: '';
      flex: none;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--clay-light);
      margin-top: .42em;
    }
    .on-dark .support-list li { color: var(--muted-inv); }
    .on-dark .support-list li::before { background: var(--gold); }
    /* ── section divider ── */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }
  </style>
</head>
